<div class="admin-page">
  <div class="page-header">
    <div>
      <a routerLink="/admin/dashboard" class="back-link">← Dashboard</a>
      <h1>Manage Events</h1>
    </div>
    <button (click)="openAddForm()" class="btn-primary">+ Add Event</button>
  </div>

  <div class="form-overlay" *ngIf="showForm()">
    <div class="form-card">
      <h2>{{ editingEvent ? 'Edit' : 'Add' }} Event</h2>
      <form (ngSubmit)="onSubmit()" #eventForm="ngForm">
        <div class="form-row">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" [(ngModel)]="form.title" name="title" required />
          </div>
          <div class="form-group">
            <label>Category *</label>
            <input type="text" [(ngModel)]="form.category" name="category" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" [(ngModel)]="form.date" name="date" required />
          </div>
          <div class="form-group">
            <label>Time *</label>
            <input type="text" [(ngModel)]="form.time" name="time" required placeholder="e.g. 10:00 AM" />
          </div>
        </div>
        <div class="form-group">
          <label>Location *</label>
          <input type="text" [(ngModel)]="form.location" name="location" required />
        </div>
        <div class="form-group">
          <label>Description *</label>
          <textarea [(ngModel)]="form.description" name="description" rows="3" required></textarea>
        </div>
        <div class="form-actions">
          <button type="button" (click)="onCancel()" class="btn-cancel">Cancel</button>
          <button type="submit" [disabled]="eventForm.invalid" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="data-table">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Date</th>
          <th>Time</th>
          <th>Location</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let event of events">
          <td>{{ event.title }}</td>
          <td>{{ event.date | date:'mediumDate' }}</td>
          <td>{{ event.time }}</td>
          <td>{{ event.location }}</td>
          <td>{{ event.category }}</td>
          <td>
            <button (click)="openEditForm(event)" class="btn-edit">Edit</button>
            <button (click)="onDelete(event.id)" class="btn-delete">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
