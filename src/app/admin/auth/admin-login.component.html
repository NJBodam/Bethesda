<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="icon">✝</span>
      <h1>Admin Portal</h1>
      <p>Bethesda House of Grace</p>
    </div>
    <div *ngIf="error()" class="error-msg">{{ error() }}</div>
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" required placeholder="admin" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" [disabled]="loginForm.invalid" class="login-btn">Sign In</button>
    </form>
    <p class="hint">Default: admin / admin123</p>
  </div>
</div>
