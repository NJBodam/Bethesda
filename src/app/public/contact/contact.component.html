<div class="page-hero">
  <h1>Contact Us</h1>
  <p>We'd love to hear from you</p>
</div>

<div class="container">
  <div class="contact-layout">
    <div class="contact-info">
      <h2>Get in Touch</h2>
      <div class="info-item">
        <span class="icon">📍</span>
        <div>
          <strong>Address</strong>
          <p>123 Faith Street, Grace City, GC 12345</p>
        </div>
      </div>
      <div class="info-item">
        <span class="icon">📞</span>
        <div>
          <strong>Phone</strong>
          <p>(555) 123-4567</p>
        </div>
      </div>
      <div class="info-item">
        <span class="icon">✉️</span>
        <div>
          <strong>Email</strong>
          <p>info&#64;bethesdahouseofgrace.org</p>
        </div>
      </div>
      <div class="info-item">
        <span class="icon">🕐</span>
        <div>
          <strong>Office Hours</strong>
          <p>Mon–Fri: 9:00 AM – 5:00 PM</p>
        </div>
      </div>
    </div>

    <div class="contact-form">
      <div *ngIf="submitted()" class="success-message">
        ✅ Thank you! Your message has been sent. We'll get back to you soon.
      </div>

      <form (ngSubmit)="onSubmit()" #contactForm="ngForm" *ngIf="!submitted()">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input id="name" type="text" [(ngModel)]="form.name" name="name" required placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input id="email" type="email" [(ngModel)]="form.email" name="email" required placeholder="john@example.com" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input id="phone" type="tel" [(ngModel)]="form.phone" name="phone" placeholder="(555) 000-0000" />
          </div>
          <div class="form-group">
            <label for="subject">Subject *</label>
            <input id="subject" type="text" [(ngModel)]="form.subject" name="subject" required placeholder="How can we help?" />
          </div>
        </div>
        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" [(ngModel)]="form.message" name="message" required rows="5" placeholder="Write your message here..."></textarea>
        </div>
        <button type="submit" class="submit-btn" [disabled]="contactForm.invalid">Send Message</button>
      </form>
    </div>
  </div>
</div>
