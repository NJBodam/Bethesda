<div class="card">
  <div class="card-image" *ngIf="imageUrl">
    <img [src]="imageUrl" [alt]="title" />
  </div>
  <div class="card-body">
    <h3 class="card-title" *ngIf="title">{{ title }}</h3>
    <p class="card-subtitle" *ngIf="subtitle">{{ subtitle }}</p>
    <ng-content></ng-content>
  </div>
</div>
